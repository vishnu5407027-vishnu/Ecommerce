{% extends "base.html" %}

{% block content %}

<style>
    .auth-container {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e73e8, #4aa3ff);
        padding: 20px;
    }

    .auth-card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .auth-card h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: #555;
    }

    .form-group input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        transition: 0.3s;
        font-size: 14px;
    }

    .form-group input:focus {
        border-color: #1e73e8;
        outline: none;
        box-shadow: 0 0 5px rgba(30,115,232,0.3);
    }

    .btn-auth {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background-color: #1e73e8;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-auth:hover {
        background-color: #155cc0;
    }

    .error-box {
        background-color: #ffe6e6;
        color: #cc0000;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
    }

    .auth-footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .auth-footer a {
        color: #1e73e8;
        text-decoration: none;
        font-weight: 500;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    @media (max-width: 480px) {
        .auth-card {
            padding: 25px;
        }
    }
</style>

<div class="auth-container">
    <div class="auth-card">

        <h2>Create Account</h2>

        {% if form.errors %}
            <div class="error-box">
                {{ form.errors }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn-auth">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account?
            <a href="{% url 'accounts:login' %}">Login</a>
        </div>

    </div>
</div>

{% endblock %}
