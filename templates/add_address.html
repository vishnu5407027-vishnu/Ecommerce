{% extends "base.html" %}

{% block content %}

<style>
    .address-container {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e73e8, #4aa3ff);
        padding: 20px;
    }

    .address-card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .address-card h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: #1e73e8;
        outline: none;
        box-shadow: 0 0 5px rgba(30,115,232,0.3);
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: none;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-primary {
        background: #1e73e8;
        color: white;
    }

    .btn-primary:hover {
        background: #1558b0;
    }

    .btn-back {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        font-size: 13px;
        color: #666;
    }

    .btn-back:hover {
        color: #1e73e8;
    }

    .errorlist {
        color: red;
        font-size: 12px;
        margin-top: 5px;
        list-style: none;
        padding: 0;
    }

</style>

<div class="address-container">
    <div class="address-card">

        <h2>Add New Address</h2>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary">
                Save Address
            </button>
        </form>

        <a href="{% url 'accounts:profile' %}" class="btn-back">
            ← Back to Profile
        </a>

    </div>
</div>

{% endblock %}
